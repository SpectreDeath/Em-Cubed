name: CI

on:
  push:
    branches: [ main, master, skills-library ]
  pull_request:
    branches: [ main, master, skills-library ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
    - uses: actions/checkout@v4
    
    - name: Install SWI-Prolog
      run: sudo apt-get update && sudo apt-get install -y swi-prolog
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .[dev]
        # Try to install surface dependencies (don't fail if they don't install)
        pip install pyswip hy z3-solver pyDatalog || echo "Surface dependencies not fully installed"
    
    - name: Lint with ruff
      run: ruff check src/ tests/
    
    - name: Type check with mypy
      run: mypy src/em_cubed/

    - name: Security scan with bandit
      run: pip install bandit && bandit -r src/ -c pyproject.toml

    - name: Run tests
      timeout-minutes: 15
      run: |
        if [ "${{ matrix.python-version }}" = "3.12" ]; then
          pytest -q --cov=em_cubed --cov-report=term-missing --cov-fail-under=26
        else
          pytest -q
        fi
        python -c "import asyncio; loop = asyncio.new_event_loop(); loop.run_until_complete(loop.shutdown_asyncgens()); loop.close()" || true
    
    - name: Build package
      run: python -m pip install build && python -m build
