[build-system]
requires = ["setuptools>=68.0.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "em-cubed"
version = "0.1.0"
description = "Multi-Surface Skill Framework for Python, Prolog, and Hy execution surfaces"
authors = [
    {name = "SpectreDeath", email = "spectre@example.com"},
]
license = {text = "MIT"}
requires-python = ">=3.11"
dependencies = [
    "pyyaml>=6.0.1",
    "pyswip>=0.3.0",  # Prolog integration
    "hy>=0.28.0",       # Hy Lisp integration
    "fastapi>=0.115.0", # Optional: API serving
    "uvicorn>=0.32.0",  # Optional: ASGI server
]

[project.optional-dependencies]
dev = [
    "pytest>=8.3.4",
    "pytest-asyncio>=0.24.0",
    "ruff>=0.8.0",
    "mypy>=1.13.0",
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.ruff]
line-length = 120
target-version = "py311"

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=em_cubed --cov-report=term-missing --cov-fail-under=0 -W ignore"

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true
